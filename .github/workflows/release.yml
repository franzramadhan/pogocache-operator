name: Operator Release

# Triggers on every new version tag that the main pogocache project pushes,
# e.g. v1.5.0.  The operator image and install.yaml are stamped with the same
# version so users always install the operator that matches their pogocache
# release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to commit manifests back and create the release
  packages: write   # needed to push to GHCR

env:
  OPERATOR_IMAGE: ghcr.io/pogocache/pogocache-operator

jobs:
  # ------------------------------------------------------------------
  # 1. Build & push the multi-arch operator image to GHCR
  # ------------------------------------------------------------------
  docker:
    name: Build & push operator image
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: Set up QEMU (cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OPERATOR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # 2. Stamp the release version into manifests and commit back to main
  # ------------------------------------------------------------------
  manifests:
    name: Update & commit manifests
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - uses: actions/checkout@v6
        with:
          # Push back to main requires a token with write access.
          # GITHUB_TOKEN works when the repo allows workflow write permissions.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Stamp image tag in manager.yaml
        env:
          VERSION: ${{ needs.docker.outputs.version }}
        run: |
          sed -i "s|image: ${{ env.OPERATOR_IMAGE }}:.*|image: ${{ env.OPERATOR_IMAGE }}:${VERSION}|" \
            config/manager/manager.yaml

      - name: Regenerate install.yaml
        run: |
          cat config/crd/bases/cache.pogocache.io_pogocacheinstances.yaml \
              config/rbac/service_account.yaml \
              config/rbac/role.yaml \
              config/rbac/role_binding.yaml \
              config/manager/manager.yaml \
            > config/install.yaml

      - name: Commit updated manifests
        env:
          VERSION: ${{ needs.docker.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/manager/manager.yaml config/install.yaml
          # Only commit if there are actual changes (idempotent re-runs).
          git diff --cached --quiet || \
            git commit -m "chore(operator): bump manifests to ${VERSION} [skip ci]"
          git push origin main

  # ------------------------------------------------------------------
  # 3. Create GitHub Release and attach install.yaml as a release asset
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: manifests

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pogocache ${{ github.ref_name }}"
          body: |
            ## Pogocache Operator ${{ github.ref_name }}

            ### Install

            ```sh
            kubectl apply -f https://raw.githubusercontent.com/pogocache/pogocache/main/config/install.yaml
            ```

            Or pin to this exact release:

            ```sh
            kubectl apply -f https://github.com/pogocache/pogocache/releases/download/${{ github.ref_name }}/install.yaml
            ```

            ### Operator image

            ```
            ghcr.io/pogocache/pogocache-operator:${{ github.ref_name }}
            ```
          files: config/install.yaml
          fail_on_unmatched_files: true
